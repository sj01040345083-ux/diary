<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="leafGrad" gradientUnits="userSpaceOnUse" x1="-150" y1="-160" x2="150" y2="150">
      <stop offset="0" stop-color="#A6E15A"/>
      <stop offset="0.45" stop-color="#63C23C"/>
      <stop offset="1" stop-color="#2E9E2A"/>
    </linearGradient>
    <linearGradient id="stemGrad" gradientUnits="userSpaceOnUse" x1="-40" y1="20" x2="30" y2="180">
      <stop offset="0" stop-color="#5FBB39"/>
      <stop offset="1" stop-color="#2F9A28"/>
    </linearGradient>
    <!-- 하나의 하트 잎 (끝이 중심 0,0 을 향하고 잎몸은 위로) -->
    <g id="leaf">
      <path d="M0,0
        C -28,-40 -70,-58 -70,-106
        C -70,-144 -32,-156 -9,-132
        C -3,-126 0,-119 0,-112
        C 0,-119 3,-126 9,-132
        C 32,-156 70,-144 70,-106
        C 70,-58 28,-40 0,0 Z"
        fill="url(#leafGrad)"/>
      <!-- 잎맥 -->
      <path d="M0,-8 C 2,-50 2,-90 1,-126" fill="none"
        stroke="#2C8F26" stroke-opacity="0.35" stroke-width="5" stroke-linecap="round"/>
      <!-- 은은한 하이라이트 -->
      <path d="M-24,-118 C -44,-108 -52,-86 -44,-64" fill="none"
        stroke="#D8F5A6" stroke-opacity="0.45" stroke-width="7" stroke-linecap="round"/>
    </g>
  </defs>

  <g transform="translate(256,236) scale(1.34)">
    <!-- 줄기 -->
    <path d="M2,18 C 34,66 27,124 -22,168" fill="none"
      stroke="url(#stemGrad)" stroke-width="17" stroke-linecap="round"/>
    <!-- 네 개의 잎 (대각선 X 배치) -->
    <use href="#leaf" transform="rotate(-45)"/>
    <use href="#leaf" transform="rotate(45)"/>
    <use href="#leaf" transform="rotate(-135)"/>
    <use href="#leaf" transform="rotate(135)"/>
  </g>
</svg>
